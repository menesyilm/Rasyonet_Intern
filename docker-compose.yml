# Bu dosya birden fazla container'ı birlikte çalıştırmak için kullanılır.
services:

  # Backend servisi: ASP.NET Core Web API container'ı
  backend:
    build:
      # Backend Dockerfile'ın bulunduğu klasör.
      # Docker build komutu bu klasörü çalışma alanı olarak kullanır.
      context: ./Rasyonet_Intern.API

      # Bu build işlemi için hangi Dockerfile dosyası kullanılacak?
      dockerfile: Dockerfile

    # Oluşacak container'ın adı.
    container_name: rasyonet-api

    # Port eşleştirmesi:
    # Sol taraf host makinenin portu ben dışarıdan hangi portla erişeceğim, sağ taraf container'ın portu.
    #
    # Host makine = kendi bilgisayarın.
    # Container içindeki ASP.NET Core uygulaması 8080 portunu dinliyor.
    #
    # http://localhost:5010 -> container içindeki 8080 portuna yönlenir.
    ports:
      - "5010:8080"

    # Backend container çalışırken kullanılacak environment variable'lar.
    # Bunlar appsettings.json'daki bazı ayarları override eder.
    environment:
      # ASP.NET Core uygulamasını Development ortamında çalıştırıyoruz.
      # Bu sayede Swagger gibi development özellikleri aktif kalır.
      ASPNETCORE_ENVIRONMENT: Development

      # MSSQL
      # Bunu eklerken appsettings.json kalmalı mı? sorusu -> evet kalmalı çünkü localde çalışırken
      # windows authentication kullanmaya devam edelim diye.
      SqlDbSettings__ConnectionString: "Server=mssql,1433;Database=Rasyonet_Intern;User Id=sa;Password=Rasyonet123!;TrustServerCertificate=True;Encrypt=False;"

      # Backend container içinde 8080 portunu dinlesin.
      # + işareti tüm network interface'lerinden gelen istekleri kabul et demektir.
      ASPNETCORE_URLS: http://+:8080

      # Backend Docker içinde çalıştığı için localhost MongoDB'yi göstermez.
      # localhost, backend container'ın kendisidir.
      #
      # Change Stream kullandığın için replicaSet=rs0 kalıyor.
      MongoDbSettings__ConnectionString: "mongodb://mongodb:27017/?replicaSet=rs0"
      # appsettings.json içindeki MongoDbSettings:DatabaseName değerini override eder.
      MongoDbSettings__DatabaseName: Rasyonet_Intern

    depends_on:
      mssql:
        condition: service_healthy
      mongodb-init:
        condition: service_completed_successfully

    # Linux container'ın host.docker.internal adresini çözebilmesi için ek host tanımı.
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # Backend container'ın gerçekten sağlıklı olup olmadığını kontrol eder.
    # Backend'in healthcheck'i
    healthcheck:
      # Buradaki localhost, host makine değil, backend container'ın kendisidir.
      # Çünkü healthcheck komutu container içinde çalışır.
      #
      # curl ile container içindeki /health endpoint'ine istek atar.
      # -f: HTTP 400/500 gibi hatalarda komutu başarısız sayar.
      # -sS: Gereksiz çıktıyı azaltır ama hata varsa gösterir.
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1" ]

      # Her 10 saniyede bir kontrol eder.
      interval: 10s

      # 5 saniye içinde cevap gelmezse başarısız sayar.
      timeout: 5s

      # Üst üste 5 defa başarısız olursa container unhealthy olur.
      retries: 5

      # Container ilk açılırken uygulamaya toparlanması için süre verir.
      start_period: 20s

  # Frontend servisi: React + Vite container'ı
  frontend:
    build:
      # Frontend Dockerfile'ın bulunduğu klasör.
      context: ./Rasyonet_Intern.UI

      # Bu build işlemi için hangi Dockerfile dosyası kullanılacak?
      dockerfile: Dockerfile

    # Docker Desktop'ta "rasyonet-ui" olarak görünür.
    container_name: rasyonet-ui

    # Frontend port eşleştirmesi.
    # Host makinedeki 5173 portu container içindeki 5173 portuna bağlanır.
    ports:
      - "5173:5173"

    environment:
      # React kodu browser'da çalıştığı için backend'e localhost:5010 üzerinden gider.
      # Burada backend:8080 yazmıyoruz çünkü istek container içinden değil,
      # kullanıcının tarayıcısından çıkıyor.
      VITE_API_BASE_URL: http://localhost:5010/api

      # SignalR Hub adresi.
      # Backend tarafında app.MapHub<DashboardHub>("/hubs/dashboard") olduğu için bu path doğru.
      VITE_SIGNALR_URL: http://localhost:5010/hubs/dashboard

    # Frontend container'ı backend sadece "başladı" diye değil,
    # backend healthcheck'ten geçtiğinde başlatılsın.
    # Frontend'in healthcheck'i backend'in healthcheck'ine bağlıdır.
    depends_on:
      backend:
        condition: service_healthy

    # Frontend container'ın gerçekten cevap verip vermediğini kontrol eder.
    # Frontend'in healthcheck'i
    healthcheck:
      # Buradaki localhost, frontend container'ın kendisidir.
      # Vite dev server container içinde 5173 portundan cevap veriyor mu?
      test: [ "CMD-SHELL", "curl -fsS http://localhost:5173 || exit 1" ]

      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mssql:
    # MSSQL için Dockerfile yazmıyoruz çünkü Microsoft'un resmi image'ını kullanıyoruz.
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: rasyonet-mssql
    environment:
      # Microsoft SQL Server lisans sözleşmesini kabul ettiğimizi belirtir.
      ACCEPT_EULA: "Y"
      # Docker içindeki MSSQL'de Windows Authentication kullanmıyoruz.
      # Bunun yerine SQL Authentication kullanıyoruz.
      MSSQL_SA_PASSWORD: "Rasyonet123!"
      # SQL Server edition seçimi.
      # Developer edition geliştirme ortamı için ücretsiz ve yeterlidir.
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
      # Volume kullanmamızın sebebi veritabanı verilerini kalıcı hale getirmek.
      # Eğer volume kullanmazsak container silindiğinde SQL Server içindeki veriler de gider.
      # mssql_data              -> Docker volume adı
      # /var/opt/mssql          -> SQL Server'ın container içinde veri tuttuğu klasör
    volumes:
      - mssql_data:/var/opt/mssql

    # $${MSSQL_SA_PASSWORD} yazmamızın sebebi:
    # Docker Compose'un değişkeni host tarafında değil,
    # container içinde çözmesini istememiz.
    healthcheck:
      test: [ "CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

    restart: unless-stopped

  # MongoDB servisi
  # Bu container, uygulamadaki Sales / Categories gibi document collection'larını tutacak.
  # Ayrıca MongoChangeWatcher içindeki WatchAsync çalışabilsin diye replica set olarak açılıyor.
  mongodb:
    # MongoDB için hazır resmi image kullanıyoruz.
    # MSSQL'de olduğu gibi burada da Dockerfile yazmamıza gerek yok.
    image: mongo:7.0
    container_name: rasyonet-mongodb

    # Replica set config içinde bu hostname'i kullanacağız.
    # Backend container MongoDB'ye "mongodb:27017" adresiyle ulaşacak.
    hostname: mongodb
    # MongoDB'yi normal standalone modda değil,
    # rs0 isimli replica set olarak başlatıyoruz.
    command: [ "mongod", "--replSet", "rs0", "--bind_ip_all" ]
    ports:
      - "27017:27017"

    volumes:
      # MongoDB verilerini kalıcı hale getirmek için volume kullanıyoruz.
      - mongodb_data:/data/db

    # MongoDB ayağa kalktı mı diye bakar.
    healthcheck:
      test: [ "CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    # Container beklenmedik şekilde durursa tekrar başlatılır.
    restart: unless-stopped
  mongodb-init:
    image: mongo:7.0
    container_name: rasyonet-mongodb-init

    depends_on:
      mongodb:
        condition: service_healthy

    command: >
      mongosh --host mongodb:27017 --quiet --eval "try {
        rs.status();
      } catch (e) {
        rs.initiate({
          _id: 'rs0',
          members: [
            { _id: 0, host: 'mongodb:27017' }
          ]
        });
      }"

    restart: "no"

# Bu kısım services'in içinde değil, root seviyede olmalı.
# Burada yukarıda kullandığımız mssql_data volume'ünü tanımlıyoruz.
# Docker bu volume'ü yönetir ve veritabanı dosyalarını burada saklar.
volumes:
  mssql_data:
  mongodb_data:
